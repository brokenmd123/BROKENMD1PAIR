<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ahmed Malik - WhatsApp Linker</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>

<style>

body {
  background: #0f0f0f;
  color: #fff;
  font-family: sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* 🌈 RAINBOW BORDER */
@keyframes rainbow {
  0% {background-position: 0%}
  100% {background-position: 400%}
}

.container {
  width: 400px;
  padding: 25px;
  border-radius: 20px;
  position: relative;
  background: #111;
  z-index: 1;
}

.container::before {
  content: "";
  position: absolute;
  inset: -2px;
  background: linear-gradient(90deg,
    red, orange, yellow, green, cyan, blue, violet, red);
  background-size: 400%;
  border-radius: 20px;
  z-index: -1;
  animation: rainbow 6s linear infinite;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 20px;
}

.rainbow-text {
  background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: rainbow 6s linear infinite;
}

/* 🌐 SOCIAL BUTTONS */
.social-icons {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin: 15px 0;
}

.social-icons a {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 18px;
  transition: 0.3s;
}

.youtube { background: red; }
.telegram { background: #0088cc; }
.whatsapp { background: #25D366; }
.github { background: #333; }

.social-icons a:hover {
  transform: scale(1.2);
}

/* INPUT */
.input-field {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 15px;
}

/* BUTTON */
.generate-btn {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  margin-bottom: 10px;
  background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet);
  background-size: 300%;
  animation: rainbow 5s linear infinite;
  color: #000;
}

/* CODE BOX */
.code-display {
  padding: 12px;
  border-radius: 10px;
  text-align: center;
  margin-bottom: 10px;
  font-weight: bold;
  background: #000;
  position: relative;
}

.code-display::before {
  content: "";
  position: absolute;
  inset: -2px;
  border-radius: 10px;
  background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet);
  z-index: -1;
  background-size: 300%;
  animation: rainbow 6s linear infinite;
}

/* COPY BUTTON */
.copy-btn {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  background: linear-gradient(90deg, violet, blue, cyan, green, yellow, orange, red);
  background-size: 300%;
  animation: rainbow 5s linear infinite;
}

/* FOOTER */
.footer {
  text-align: center;
  margin-top: 15px;
  font-size: 12px;
  opacity: 0.7;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
  <h1 class="rainbow-text">Ahmed Malik Bot</h1>
  <p>WhatsApp Link System</p>

  <!-- 🔥 SOCIAL LINKS -->
  <div class="social-icons">
    <a href="https://www.youtube.com/@BROKENMD" target="_blank" class="youtube"><i class="fab fa-youtube"></i></a>
    <a href="https://t.me/ZiddiBotDev" target="_blank" class="telegram"><i class="fab fa-telegram"></i></a>
    <a href="https://whatsapp.com/channel/0029VbC3P537T8baaNuZWS0Y" class="whatsapp"><i class="fab fa-whatsapp"></i></a>
    <a href="https://github.com/brokenmd123/BROKEN-MD-" target="_blank" class="github"><i class="fab fa-github"></i></a>
  </div>

</div>

<input type="text" id="number" class="input-field" placeholder="923XXXXXXXXX">

<button class="generate-btn" onclick="getCode()">
  Generate Pair Code
</button>

<div class="code-display" id="code">
  Your code will appear here
</div>

<button class="copy-btn" onclick="copyCode()">
  Copy Code
</button>

<div class="footer">
  © Ahmed Malik | BROKEN MD
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
async function getCode(){
  const num = document.getElementById("number").value
  const codeBox = document.getElementById("code")

  if(!num) return codeBox.innerText = "Enter Number"

  codeBox.innerText = "Loading..."

  try{
    const res = await axios(`/pair?number=${num}`)
    codeBox.innerText = res.data.code
  }catch(e){
    codeBox.innerText = "Error"
  }
}

function copyCode(){
  const text = document.getElementById("code").innerText
  navigator.clipboard.writeText(text)
}
</script>

</body>
</html>
